<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TapTea | Sankhala Tea Stall</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<h1>🍃 TapTea</h1>

<p>Sankhala Tea Stall</p>

</header>

<section class="stats">

<div class="card">

<h2>Today's Revenue</h2>

<h1 id="revenue">₹0</h1>

</div>

<div class="card">

<h3>Total Orders</h3>

<p id="orders">0</p>

</div>

<div class="card">

<h3>Estimated Profit</h3>

<p id="profit">₹0</p>

</div>

</section>

<section class="products">

<h2>Products</h2>

<div class="product">

<div>

<h3>☕ Tea</h3>

<p>₹15</p>

</div>

<button onclick="addSale('tea',15)">+1</button>

</div>

<div class="product">

<div>

<h3>☕ Coffee</h3>

<p>₹25</p>

</div>

<button onclick="addSale('coffee',25)">+1</button>

</div>

<div class="product">

<div>

<h3>💧 Water Bottle</h3>

<p>₹20</p>

</div>

<button onclick="addSale('water',20)">+1</button>

</div>

</section>

<section class="customers">

<h2>Regular Customers</h2>

<ul>

<li>🏢 SDM Office</li>

<li>🏢 Mahadev Hardware</li>

<li>🏢 Rustom Khan</li>

</ul>

</section>

<section class="custom">

<h2>Add Custom Product</h2>

<input
type="text"
id="productName"
placeholder="Product Name">

<input
type="number"
id="productPrice"
placeholder="Price">

<button onclick="addCustomProduct()">
Add Product
</button>

<div id="customProducts"></div>

</section>

<footer>

<nav>

<button>🏠 Home</button>

<button>📦 Orders</button>

<button>📊 Reports</button>

<button>⚙ Settings</button>

</nav>

</footer>

</div>

<script src="js/app.js"></script>

</body>
</html>
